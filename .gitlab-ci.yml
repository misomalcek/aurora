# GitLab Pages — static deploy of the single-file app.
pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp index.html aurora-chat.html README.md cf-proxy-worker.js public/ 2>/dev/null || true
    - cp screenshot-*.png public/ 2>/dev/null || true
  artifacts:
    paths: [public]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
